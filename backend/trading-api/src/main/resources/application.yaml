spring:
  application:
    name: trading-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/paper}
    username: ${DB_USERNAME:paper}
    password: ${DB_PASSWORD:paper}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 100
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

trading:
  collector-api:
    base-url: ${COLLECTOR_API_URL:http://localhost:8081}
  kis:
    paper-app-key: ${KIS_PAPER_APP_KEY:}
    paper-app-secret: ${KIS_PAPER_APP_SECRET:}
    live-app-key: ${KIS_LIVE_APP_KEY:}
    live-app-secret: ${KIS_LIVE_APP_SECRET:}

server:
  port: 8080