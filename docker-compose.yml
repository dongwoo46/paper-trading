services:
  postgres:
    image: postgres:16-alpine
    container_name: market-collector-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: paper
      POSTGRES_USER: paper
      POSTGRES_PASSWORD: paper
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U paper -d paper']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: market-collector-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: market-collector-ollama
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 15s
      timeout: 10s
      retries: 10

  ollama-pull:
    image: ollama/ollama:latest
    container_name: market-collector-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    restart: 'no'
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
    entrypoint: ['/bin/sh', '-c']
    command: 'ollama pull $OLLAMA_MODEL'

volumes:
  postgres_data:
  redis_data:
  ollama_data:
