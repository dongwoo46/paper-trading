services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: paper
      POSTGRES_USER: paper
      POSTGRES_PASSWORD: paper
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U paper -d paper']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 15s
      timeout: 10s
      retries: 10

  ollama-pull:
    image: alpine:latest
    container_name: ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    restart: 'no'
    volumes:
      - ./scripts/pull-models.sh:/pull-models.sh
    entrypoint: ['/bin/sh', '/pull-models.sh']

  trading-api:
    build:
      context: ./backend/trading-api
      dockerfile: Dockerfile
    container_name: trading-api
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/paper
      DB_USERNAME: paper
      DB_PASSWORD: paper
      REDIS_HOST: redis
      REDIS_PORT: 6379
      COLLECTOR_API_URL: http://collector-api:8080
    env_file:
      - ./backend/trading-api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  collector-api:
    build:
      context: ./backend/collector-api
      dockerfile: Dockerfile
    container_name: collector-api
    restart: unless-stopped
    ports:
      - '8081:8080'
    environment:
      JDBC_URL: jdbc:postgresql://postgres:5432/paper
      JDBC_USERNAME: paper
      JDBC_PASSWORD: paper
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file:
      - ./backend/collector-api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  collector-worker:
    build:
      context: ./backend/collector-worker
      dockerfile: Dockerfile
    container_name: collector-worker
    restart: unless-stopped
    ports:
      - '8082:8082'
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: paper
      PG_USER: paper
      PG_PASSWORD: paper
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  ollama_data:
